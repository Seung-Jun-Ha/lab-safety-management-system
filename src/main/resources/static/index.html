<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>연구실 안전관리 시스템</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #dbe3f0;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .shell {
      width: min(1100px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 36px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e8f0ff;
      color: var(--primary);
      font-size: 0.88rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .group {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      background: #fbfdff;
    }

    .group h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .group p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .buttons {
      display: grid;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
      background: #f8fbff;
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn.primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="header">
      <div class="eyebrow">연구실 안전관리 시스템</div>
      <h1>유스케이스 진입</h1>
    </section>

    <section class="grid" aria-label="기능 버튼 목록">
      <article class="group">
        <h2>UC-1001 / UC-1004</h2>
        <div class="buttons">
          <a class="btn primary" href="/auth/register">사용자 등록 신청</a>
          <a class="btn" href="/auth/login">사용자 조회</a>
        </div>
      </article>

      <article class="group">
        <h2>UC-2001 / UC-2003</h2>
        <div class="buttons">
          <a class="btn primary" href="/lab/register">연구실 기본정보 등록</a>
          <a class="btn" href="/lab/safety-rating">연구실 기본정보 조회</a>
        </div>
      </article>

      <article class="group">
        <h2>UC-3009 / UC-3012</h2>
        <div class="buttons">
          <a class="btn primary" href="/chemical/register">시약 재고 등록</a>
          <a class="btn" href="/chemical/approval">시약 재고 조회</a>
        </div>
      </article>

      <article class="group">
        <h2>UC-4009 / UC-4012</h2>
        <div class="buttons">
          <a class="btn primary" href="/waste/register">폐기물 정보 등록</a>
          <a class="btn" href="/waste/request">폐기물 정보 조회</a>
        </div>
      </article>

      <article class="group">
        <h2>UC-5002 / UC-5013</h2>
        <div class="buttons">
          <a class="btn primary" href="/check/daily">일상점검 등록</a>
          <a class="btn" href="/check/defect-action">일상점검 현황 조회</a>
        </div>
      </article>

      <article class="group">
        <h2>UC-6001 / UC-6004</h2>
        <div class="buttons">
          <a class="btn primary" href="/education/confirm">연구활동종사자 분류 등록</a>
          <a class="btn" href="/education/warning">연구활동종사자 분류 조회</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
